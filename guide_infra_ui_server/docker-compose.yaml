version: '3.7'

services:
  postgres:
    image: postgres:14.1
    ports:
      - '8090:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: guide_infra_ui
      POSTGRES_PASSWORD: "TCvdbiuJG_rQrfoG1OzdFvYdWp_RgH-m"
    volumes:
      - guide_infra_ui_data:/var/lib/postgresql/data
  redis:
    image: redis:6.2.6
    ports:
      - '8091:6379'
    command: redis-server --requirepass "ohUoDNDgvZUyqAXFZaaI9m337mZBApb9"
    environment:
      - REDIS_REPLICATION_MODE=master
volumes:
  guide_infra_ui_data:
